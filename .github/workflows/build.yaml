name: dotnet package

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Display dotnet version
        run: dotnet --version
      - name: Build
        run: dotnet build LimbusLocalize.sln
      - uses: actions/upload-artifact@v4
        with:
          name: LTM_arch_temp
          path: Release/
